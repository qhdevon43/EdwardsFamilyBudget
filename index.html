<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Edwards Family Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
:root{--paper:#FBFAF8;--card:#FFF;--ink:#20241F;--muted:#6B6F66;--rule:#DDD9CF;--spruce:#1F5C46;--brick:#A63A2B;
--serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
--mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace}
@media(prefers-color-scheme:dark){
  :root{color-scheme:dark;--paper:#101310;--card:#181C18;--ink:#ECEFEA;--muted:#A6ADA5;--rule:#394139;--spruce:#72C49A;--brick:#EF8D7C}
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);
color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;transition:background-color .2s ease,color .2s ease}
.lock{width:min(400px,92vw);border:2px solid var(--ink);background:var(--card);padding:34px 28px;text-align:center}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1{font-family:var(--serif);font-size:28px;margin:10px 0 4px;font-weight:600}
p{color:var(--muted);font-size:14px;margin:4px 0 22px}
.emoji{font-size:34px}
input[type=password]{width:100%;font-family:var(--mono);font-size:16px;padding:12px;border:1.5px solid var(--rule);
border-radius:2px;text-align:center;background:var(--paper);color:var(--ink)}
input[type=password]:focus{outline:2px solid var(--spruce);border-color:var(--spruce)}
button{width:100%;margin-top:12px;font-family:var(--mono);font-size:14px;letter-spacing:.04em;padding:12px;
border:none;border-radius:2px;background:var(--spruce);color:#fff;cursor:pointer;font-weight:700}
button:disabled{opacity:.6;cursor:wait}
.remember{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:14px;font-size:13px;color:var(--muted)}
.err{color:var(--brick);font-size:13px;min-height:18px;margin-top:10px;font-weight:600}
</style>
</head>
<body>
<div class="lock">
  <div class="emoji">🧾🔒</div>
  <div class="eyebrow">Private — Edwards family</div>
  <h1>Family Ledger</h1>
  <p>This page is encrypted. Enter the family password.</p>
  <form id="f">
    <input type="password" id="pw" autocomplete="current-password" placeholder="password" autofocus>
    <button id="btn" type="submit">Unlock</button>
  </form>
  <label class="remember"><input type="checkbox" id="rem" checked> Remember on this device</label>
  <div class="err" id="err"></div>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(pw) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(P.salt), iterations:P.iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function tryKey(key) {
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.iv)}, key, b64(P.ct));
  const html = new TextDecoder().decode(pt);
  document.open(); document.write(html); document.close();
}
async function unlock(e) {
  if (e) e.preventDefault();
  const btn = document.getElementById('btn'), err = document.getElementById('err');
  btn.disabled = true; btn.textContent = 'Unlocking…'; err.textContent = '';
  try {
    const key = await deriveKey(document.getElementById('pw').value.trim());
    const raw = await crypto.subtle.exportKey('raw', key);
    const rawB64 = btoa(String.fromCharCode(...new Uint8Array(raw)));
    try { sessionStorage.setItem('lk', rawB64); } catch (e) {}
    if (document.getElementById('rem').checked) {
      try { localStorage.setItem('ledgerKey', rawB64); } catch (e) {}
    }
    await tryKey(key);
  } catch (ex) {
    err.textContent = 'Wrong password — try again.';
    btn.disabled = false; btn.textContent = 'Unlock';
  }
}
document.getElementById('f').addEventListener('submit', unlock);
async function autoUnlock() {
  const saved = localStorage.getItem('ledgerKey');
  if (!saved) return;
  try {
    const key = await crypto.subtle.importKey('raw', b64(saved), {name:'AES-GCM'}, false, ['decrypt']);
    try { sessionStorage.setItem('lk', saved); } catch (e) {}
    await tryKey(key);
  } catch (ex) { localStorage.removeItem('ledgerKey'); }
}
if (document.readyState === 'complete') autoUnlock();
else window.addEventListener('load', autoUnlock);
